		<title>SOLIVAGANT - Artisan Perfumery Atelier</title>
		<style>
			html {
				background: #070906;
			}

			body {
				margin: 0;
				background: #070906;
			}

			.app-boot-fallback {
				min-height: 100vh;
				display: grid;
				place-items: center;
				overflow: hidden;
				padding: 24px;
				background:
					radial-gradient(circle at 70% 40%, rgba(183, 155, 99, 0.18), transparent 34%),
					linear-gradient(115deg, rgba(7, 9, 6, 0.96), rgba(18, 27, 18, 0.98));
				color: #f6f0e3;
				font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				text-align: center;
			}

			.app-boot-fallback::before {
				content: "";
				position: fixed;
				inset: 0;
				opacity: 0.13;
				pointer-events: none;
				background-image:
					linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
					linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
				background-size: 42px 42px;
				mix-blend-mode: screen;
			}

			.app-boot-fallback h1 {
				position: relative;
				margin: 0;
				color: #f6f0e3;
				font-family: Georgia, "Times New Roman", serif;
				font-size: clamp(3.3rem, 8vw, 8rem);
				font-weight: 500;
				letter-spacing: 0.08em;
			}

			.app-boot-fallback h2 {
				position: relative;
				max-width: 820px;
				margin: 18px auto 0;
				color: #f6f0e3;
				font-family: Georgia, "Times New Roman", serif;
				font-size: clamp(2.25rem, 5vw, 5.5rem);
				font-weight: 500;
				letter-spacing: 0;
				line-height: 0.98;
			}

			.app-boot-fallback p {
				position: relative;
				margin: 0;
				font-size: 14px;
				font-weight: 700;
				letter-spacing: 0.18em;
				text-transform: uppercase;
			}

			.app-boot-fallback .app-boot-description {
				max-width: 680px;
				margin: 18px auto 0;
				color: rgba(246, 240, 227, 0.72);
				font-size: 16px;
				font-weight: 600;
				letter-spacing: 0;
				line-height: 1.7;
				text-transform: none;
			}

			.app-boot-structure {
				position: relative;
				display: flex;
				flex-wrap: wrap;
				justify-content: center;
				gap: 8px;
				margin: 22px auto 0;
				padding: 0;
				list-style: none;
			}

			.app-boot-structure li {
				border: 1px solid rgba(246, 240, 227, 0.16);
				border-radius: 999px;
				background: rgba(246, 240, 227, 0.06);
				padding: 7px 11px;
				color: rgba(246, 240, 227, 0.68);
				font-size: 11px;
				font-weight: 800;
				letter-spacing: 0.12em;
				text-transform: uppercase;
			}

			.app-boot-links {
				position: relative;
				display: flex;
				flex-wrap: wrap;
				justify-content: center;
				gap: 12px;
				margin-top: 26px;
			}

			.app-boot-links a {
				display: inline-flex;
				min-height: 44px;
				align-items: center;
				border: 1px solid rgba(246, 240, 227, 0.24);
				border-radius: 8px;
				padding: 0 16px;
				color: #f6f0e3;
				font-size: 13px;
				font-weight: 800;
				text-decoration: none;
			}

			.app-boot-links a:first-child {
				background: #f6f0e3;
				color: #0b100b;
			}

			.app-boot-sections {
				position: relative;
				display: grid;
				grid-template-columns: repeat(4, minmax(0, 1fr));
				gap: 14px;
				max-width: 1120px;
				margin: 30px auto 0;
				text-align: left;
			}

			.app-boot-sections article {
				border: 1px solid rgba(246, 240, 227, 0.14);
				border-radius: 8px;
				background: rgba(246, 240, 227, 0.055);
				padding: 18px;
			}

			.app-boot-sections h3 {
				margin: 0;
				color: #f6f0e3;
				font-family: Georgia, "Times New Roman", serif;
				font-size: 22px;
				font-weight: 500;
			}

			.app-boot-sections p {
				margin-top: 10px;
				color: rgba(246, 240, 227, 0.66);
				font-size: 13px;
				font-weight: 600;
				letter-spacing: 0;
				line-height: 1.55;
				text-transform: none;
			}

			@media (max-width: 900px) {
				.app-boot-sections {
					grid-template-columns: 1fr;
				}
			}
		</style>
	</head>
	<body>
		<div id="root">
			<noscript>
				<main class="app-boot-fallback" aria-label="SOLIVAGANT public storefront">
					<div>
						<p>Artisan Perfumery Atelier</p>
						<h1>SOLIVAGANT</h1>
						<h2>Fragrance as a memory object.</h2>
						<p class="app-boot-description">SOLIVAGANT is an artisan perfume atelier by Dekito. The interactive storefront requires JavaScript for product browsing, cart, checkout, and order tracking.</p>
						<section class="app-boot-sections" aria-label="Public storefront previews">
							<article>
								<h3>Fragrance Collection</h3>
								<p>Quiet perfume objects with notes, concentration, size variants, price, and customer-facing availability.</p>
							</article>
							<article>
								<h3>Bespoke Consultation</h3>
								<p>Request parfum custom through Aroma, Preferensi, Botol, Ongkir, and Bayar. Pre-order 7-14 hari.</p>
							</article>
							<article>
								<h3>Raw Material Archive</h3>
								<p>Public storytelling for origins, olfactive families, sensory texture, mood, and usage stories.</p>
							</article>
							<article>
								<h3>Journal</h3>
								<p>Editorial notes on scent memory, raw materials, atelier process, product stories, and perfumery culture.</p>
							</article>
						</section>
						<ul class="app-boot-structure" aria-label="Public storefront sections">
							<li>Fragrance collection</li>
							<li>Bespoke ritual</li>
							<li>Raw material archive</li>
							<li>Journal</li>
						</ul>
						<div class="app-boot-links">
							<a href="/">Homepage</a>
							<a href="/catalog">Collection</a>
							<a href="/bespoke">Bespoke</a>
							<a href="/materials">Materials</a>
							<a href="/journal">Journal</a>
						</div>
					</div>
				</main>
			</noscript>
		</div>
		<script>
			(function () {
				var PUBLIC_ROUTE_FALLBACKS = {
					'/': {
						eyebrow: 'Artisan Perfumery Atelier',
						title: 'SOLIVAGANT',
						headline: 'Fragrance as a memory object.',
						description: 'An artisan perfume atelier by Dekito, crafting quiet olfactive works from raw materials, memory, and personal ritual.',
						items: ['Hero', 'Perfumer story', 'Collection preview', 'Bespoke ritual'],
					},
					'/home': {
						eyebrow: 'Artisan Perfumery Atelier',
						title: 'SOLIVAGANT',
						headline: 'Fragrance as a memory object.',
						description: 'An artisan perfume atelier by Dekito, crafting quiet olfactive works from raw materials, memory, and personal ritual.',
						items: ['Hero', 'Perfumer story', 'Collection preview', 'Bespoke ritual'],
					},
					'/catalog': {
						eyebrow: 'Fragrance Collection',
						title: 'Fragrance Collection',
						headline: 'Quiet signatures for skin, atmosphere, and ritual.',
						description: "Explore SOLIVAGANT fragrances including Hug, Chant Nocturne, Jaipong, Porte vers le Paradis, and Trace d'Aventure. Each public product preview includes notes, concentration, size variants, price, and availability.",
						items: ['Hug', 'Chant Nocturne', 'Jaipong', 'Porte vers le Paradis', "Trace d'Aventure"],
					},
					'/bespoke': {
						eyebrow: 'Bespoke Perfume Consultation',
						title: 'Bespoke Perfume Consultation',
						headline: 'Request parfum custom. Pre-order 7-14 hari.',
						description: 'A public consultation flow for custom perfume requests: Aroma, Preferensi, Botol, Ongkir, and Bayar. The internal studio brief, formula, validation, and production details stay private.',
						items: ['Aroma', 'Preferensi', 'Botol', 'Ongkir', 'Bayar'],
					},
					'/materials': {
						eyebrow: 'Raw Material Archive',
						title: 'Raw Material Archive',
						headline: 'Materials as stories, not inventory.',
						description: 'A public archive of origins, olfactive families, sensory descriptions, and mood.',
						items: ['Origin', 'Olfactive family', 'Sensory description', 'Mood'],
					},
					'/journal': {
						eyebrow: 'Journal',
						title: 'Journal',
						headline: 'Field notes from the atelier.',
						description: 'Editorial notes on scent memory, raw materials, atelier process, product stories, and perfumery culture.',
						items: ['Scent memory', 'Raw materials', 'Atelier process', 'Product stories'],
					},
					'/track-order': {
						eyebrow: 'Track Your Order',
						title: 'Track Your Order',
						headline: 'Customer order status.',
						description: 'Order number, email or phone lookup, public tracking timeline, and estimated delivery placeholder.',
						items: ['Order number', 'Customer contact', 'Timeline', 'Estimated delivery'],
					},
					'/cart': {
						eyebrow: 'Customer Cart',
						title: 'Cart',
						headline: 'Selected fragrance objects.',
						description: 'Cart items, quantity controls, subtotal, and checkout CTA for public customers.',
						items: ['Cart items', 'Quantity controls', 'Subtotal', 'Checkout'],
					},
					'/checkout': {
						eyebrow: 'Checkout',
						title: 'Checkout',
						headline: 'Customer and shipping information.',
						description: 'Checkout placeholder with customer information, shipping information, payment placeholder, and order summary.',
						items: ['Customer information', 'Shipping', 'Payment placeholder', 'Order summary'],
					},
				};

				function escapeHtml(value) {
					return String(value || '').replace(/[&<>"']/g, function (character) {
						return ({
							'&': '&amp;',
							'<': '&lt;',
							'>': '&gt;',
							'"': '&quot;',
							"'": '&#39;',
						})[character];
					});
				}

				function normalizePathname(pathname) {
					var normalized = String(pathname || '/').replace(/\/+$/, '');
					return normalized || '/';
				}

				function getFallbackContent() {
					var pathname = normalizePathname(window.location.pathname);
					return PUBLIC_ROUTE_FALLBACKS[pathname] || {
						eyebrow: 'SOLIVAGANT',
						title: 'Page not found.',
						headline: 'This public atelier page could not be found.',
						description: 'Return to the homepage or explore the SOLIVAGANT fragrance collection.',
						items: ['Homepage', 'Collection'],
					};
				}

				function renderPublicBootFallback() {
					var root = document.getElementById('root');
					if (!root) return;

					var content = getFallbackContent();
					var items = content.items.map(function (item) {
						return '<li>' + escapeHtml(item) + '</li>';
					}).join('');

					root.innerHTML = [
						'<main class="app-boot-fallback" aria-label="SOLIVAGANT public storefront">',
						'  <div>',
						'    <p>' + escapeHtml(content.eyebrow) + '</p>',
						'    <h1>' + escapeHtml(content.title) + '</h1>',
						'    <h2>' + escapeHtml(content.headline) + '</h2>',
						'    <p class="app-boot-description">' + escapeHtml(content.description) + '</p>',
						'    <ul class="app-boot-structure" aria-label="Storefront sections">' + items + '</ul>',
						'    <div class="app-boot-links">',
						'      <a href="/catalog">Explore Collection</a>',
						'      <a href="/bespoke">Book Bespoke Consultation</a>',
						'    </div>',
						'  </div>',
						'</main>',
					].join('');
				}

				renderPublicBootFallback();

				var RECOVERY_KEY = 'solivagant.pwa.module-recovery.v2';
				var MAX_RECOVERY_ATTEMPTS = 2;
				var MODULE_FAILURE_MESSAGES = [
					'Importing a module script failed',
					'Failed to fetch dynamically imported module',
					'Loading chunk',
					'Unable to preload CSS',
				];

				function getRecoveryAttempts() {
					try {
						return Number(window.sessionStorage.getItem(RECOVERY_KEY) || '0');
					} catch (error) {
						return 0;
					}
				}

				function setRecoveryAttempts(value) {
					try {
						window.sessionStorage.setItem(RECOVERY_KEY, String(value));
					} catch (error) {
						// Session storage is optional; recovery should still continue.
					}
				}

				function isModuleFailure(eventOrReason) {
					var target = eventOrReason && eventOrReason.target;
					var message = String(
						(eventOrReason && eventOrReason.message)
						|| (eventOrReason && eventOrReason.reason && eventOrReason.reason.message)
						|| eventOrReason
						|| ''
					);

					if (target && target.tagName === 'SCRIPT' && target.type === 'module') {
						return true;
					}

					return MODULE_FAILURE_MESSAGES.some(function (entry) {
						return message.indexOf(entry) !== -1;
					});
				}

				function renderManualRecovery() {
					var root = document.getElementById('root');
					if (!root) return;

					root.innerHTML = [
						'<div class="app-boot-fallback" role="alert">',
						'  <div>',
						'    <p>App cache perlu direset.</p>',
						'    <button type="button" data-reset-app-cache style="margin-top:16px;min-height:44px;border:0;border-radius:14px;background:#263d27;color:white;padding:0 18px;font-weight:800;">Reset app cache</button>',
						'  </div>',
						'</div>',
					].join('');

					var button = root.querySelector('[data-reset-app-cache]');
					if (button) {
						button.addEventListener('click', function () {
							setRecoveryAttempts(0);
							recoverFromModuleFailure('manual reset');
						});
					}
				}

				async function clearAppRuntimeCache() {
					if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
						var registrations = await navigator.serviceWorker.getRegistrations();
						await Promise.all(registrations.map(function (registration) {
							return registration.unregister();
						}));
					}

					if (window.caches && window.caches.keys) {
						var cacheNames = await window.caches.keys();
						await Promise.all(cacheNames
							.filter(function (cacheName) {
								return cacheName.indexOf('solivagant-') === 0 || cacheName.indexOf('perfumer-studio-') === 0;
							})
							.map(function (cacheName) {
								return window.caches.delete(cacheName);
							}));
					}
				}

				async function recoverFromModuleFailure(reason) {
					if (!window.navigator.onLine) {
						return;
					}

					var attempts = getRecoveryAttempts();
					if (attempts >= MAX_RECOVERY_ATTEMPTS) {
						renderManualRecovery();
						return;
					}

					setRecoveryAttempts(attempts + 1);

					try {
						await clearAppRuntimeCache();
					} catch (error) {
						// Reload anyway. A new navigation may install the latest service worker.
					}

					var nextUrl = new URL(window.location.href);
					nextUrl.searchParams.set('pwa-recover', Date.now().toString(36));
					nextUrl.searchParams.set('reason', String(reason || 'module').slice(0, 24));
					window.location.replace(nextUrl.toString());
				}

				window.addEventListener('error', function (event) {
					if (isModuleFailure(event)) {
						event.preventDefault();
						recoverFromModuleFailure(event.message || 'module-script');
					}
				}, true);

				window.addEventListener('unhandledrejection', function (event) {
					if (isModuleFailure(event)) {
						event.preventDefault();
						recoverFromModuleFailure(event.reason || 'module-rejection');
					}
				});

				window.setTimeout(function () {
					var root = document.getElementById('root');
					if (root && root.querySelector('.app-boot-fallback')) {
						recoverFromModuleFailure('boot-timeout');
					}
				}, 14000);
			})();
		</script>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
