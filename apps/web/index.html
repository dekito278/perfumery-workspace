<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="/icons/icon-192.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<meta name="theme-color" content="#f7f8f2" />
		<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Solivagant" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="application-name" content="Solivagant" />
		<meta name="description" content="Solivagant storefront and studio workspace for products, orders, briefs, raw materials, formulas, and validation." />
		<title>Solivagant</title>
		<style>
			html {
				background: #f7f8f2;
			}

			body {
				margin: 0;
				background: #f7f8f2;
			}

			.app-boot-fallback {
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 24px;
				color: #263d27;
				font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				text-align: center;
			}

			.app-boot-spinner {
				width: 40px;
				height: 40px;
				margin: 0 auto 16px;
				border: 4px solid rgba(38, 61, 39, 0.2);
				border-top-color: #263d27;
				border-radius: 999px;
				animation: app-boot-spin 0.85s linear infinite;
			}

			.app-boot-fallback p {
				margin: 0;
				font-size: 14px;
				font-weight: 700;
			}

			@keyframes app-boot-spin {
				to {
					transform: rotate(360deg);
				}
			}
		</style>
	</head>
	<body>
		<div id="root">
			<div class="app-boot-fallback" role="status" aria-live="polite">
				<div>
					<div class="app-boot-spinner" aria-hidden="true"></div>
					<p>Loading Solivagant...</p>
				</div>
			</div>
		</div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
