		<link rel="apple-touch-icon" href="/icons/icon-192.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" />
		<meta name="theme-color" content="#263d27" />
		<meta name="robots" content="index,follow" />
		<meta name="mobile-web-app-capable" content="yes" />

		<title>SOLIVAGANT - Artisan Perfumery Atelier</title>
		<style>
			html {
				background: #f7f8f2;
			}

			body {
				margin: 0;
				background: #f7f8f2;
			}

			.app-boot-fallback {
				min-height: 100vh;
				box-sizing: border-box;
				display: flex;
				align-items: stretch;
				padding: 24px;
				background: linear-gradient(180deg, #f7f8f2 0%, #ffffff 100%);
				color: #263d27;
				font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			}

			.app-boot-shell {
				width: min(100%, 1180px);
				margin: auto;
				display: grid;
				gap: 18px;
			}

			.app-boot-status {
				display: flex;
				align-items: center;
				gap: 12px;
				border: 1px solid rgba(38, 61, 39, 0.12);
				border-radius: 18px;
				background: rgba(255, 255, 255, 0.86);
				padding: 16px;
				box-shadow: 0 24px 58px -46px rgba(24, 47, 27, 0.36);
			}

			.app-boot-spinner {
				width: 34px;
				height: 34px;
				flex: 0 0 auto;
				border: 3px solid rgba(38, 61, 39, 0.14);
				border-top-color: #263d27;
				border-radius: 999px;
				animation: app-boot-spin 0.9s linear infinite;
			}

			.app-boot-fallback p {
				margin: 0;
				color: #5e6a5d;
				font-size: 12px;
				font-weight: 700;
				letter-spacing: 0.16em;
				text-transform: uppercase;
			}

			.app-boot-fallback h1,
			.app-boot-fallback h2,
			.app-boot-fallback h3 {
				margin: 0;
				letter-spacing: 0;
			}

			.app-boot-fallback h1 {
				margin-top: 4px;
				color: #0b130c;
				font-size: 22px;
				font-weight: 700;
			}

			.app-boot-fallback .app-boot-description {
				margin-top: 4px;
				color: #6b7280;
				font-size: 13px;
				font-weight: 600;
				letter-spacing: 0;
				line-height: 1.45;
				text-transform: none;
			}

			.app-boot-layout {
				display: grid;
				gap: 18px;
				grid-template-columns: 260px minmax(0, 1fr);
			}

			.app-boot-panel,
			.app-boot-sidebar {
				border: 1px solid rgba(38, 61, 39, 0.12);
				border-radius: 20px;
				background: rgba(255, 255, 255, 0.78);
				padding: 18px;
				box-shadow: 0 22px 52px -46px rgba(24, 47, 27, 0.32);
			}

			.app-boot-sidebar {
				display: grid;
				gap: 12px;
				align-content: start;
			}

			.app-boot-panel {
				display: grid;
				gap: 18px;
			}

			.app-boot-row,
			.app-boot-grid {
				display: grid;
				gap: 12px;
			}

			.app-boot-grid {
				grid-template-columns: repeat(3, minmax(0, 1fr));
			}

			.app-boot-skeleton {
				display: grid;
				gap: 10px;
				border-radius: 16px;
				background: rgba(238, 242, 232, 0.72);
				padding: 14px;
			}

			.app-boot-line {
				height: 12px;
				border-radius: 999px;
				background: linear-gradient(90deg, rgba(210, 218, 202, 0.65), rgba(255, 255, 255, 0.9), rgba(210, 218, 202, 0.65));
				background-size: 240% 100%;
				animation: app-boot-shimmer 1.35s ease-in-out infinite;
			}

			.app-boot-line.short {
				width: 42%;
			}

			.app-boot-line.medium {
				width: 68%;
			}

			.app-boot-line.tall {
				height: 44px;
				border-radius: 14px;
			}

			@keyframes app-boot-spin {
				to { transform: rotate(360deg); }
			}

			@keyframes app-boot-shimmer {
				0% { background-position: 120% 0; }
				100% { background-position: -120% 0; }
			}

			@media (max-width: 760px) {
				.app-boot-fallback {
					padding: 16px;
				}

				.app-boot-layout {
					grid-template-columns: 1fr;
				}

				.app-boot-sidebar {
					display: none;
				}

				.app-boot-grid {
					grid-template-columns: 1fr;
				}
			}

			@media (prefers-reduced-motion: reduce) {
				.app-boot-spinner,
				.app-boot-line {
					animation: none;
				}
			}
		</style>
	</head>
	<body>
		<div id="root">
			<noscript>
				<main class="app-boot-fallback" aria-label="Solivagant app requires JavaScript">
					<div class="app-boot-shell">
						<section class="app-boot-status">
							<div>
								<p>App initialization</p>
								<h1>JavaScript diperlukan</h1>
								<p class="app-boot-description">Aktifkan JavaScript untuk membuka storefront, studio, cart, checkout, dan tracking order.</p>
							</div>
						</section>
					</div>
				</main>
			</noscript>
		</div>
		<script>
			(function () {
				var PUBLIC_ROUTE_FALLBACKS = {

						eyebrow: 'Artisan Perfumery Atelier',

						description: 'An artisan perfume atelier by Dekito, crafting quiet olfactive works from raw materials, memory, and personal ritual.',
						items: ['Hero', 'Perfumer story', 'Collection preview', 'Bespoke ritual'],

					'/catalog': {

						headline: 'Quiet signatures for skin, atmosphere, and ritual.',
						description: "Explore SOLIVAGANT fragrances including Hug, Chant Nocturne, Jaipong, Porte vers le Paradis, and Trace d'Aventure. Each public product preview includes notes, concentration, size variants, price, and availability.",
						items: ['Hug', 'Chant Nocturne', 'Jaipong', 'Porte vers le Paradis', "Trace d'Aventure"],
					},
					'/bespoke': {
						eyebrow: 'Bespoke Perfume Consultation',
						title: 'Bespoke Perfume Consultation',
						headline: 'Request parfum custom. Pre-order 7-14 hari.',
						description: 'A public consultation flow for custom perfume requests: Aroma, Preferensi, Botol, Ongkir, and Bayar. The internal studio brief, formula, validation, and production details stay private.',
						items: ['Aroma', 'Preferensi', 'Botol', 'Ongkir', 'Bayar'],

					'/materials': {

					'/journal': {

						items: ['Order number', 'Customer contact', 'Timeline', 'Estimated delivery'],

						headline: 'Selected fragrance objects.',
						description: 'Cart items, quantity controls, subtotal, and checkout CTA for public customers.',
						items: ['Cart items', 'Quantity controls', 'Subtotal', 'Checkout'],
					},
					'/checkout': {
						eyebrow: 'Checkout',
						title: 'Checkout',
						headline: 'Customer and shipping information.',
						description: 'Checkout placeholder with customer information, shipping information, payment placeholder, and order summary.',
						items: ['Customer information', 'Shipping', 'Payment placeholder', 'Order summary'],
					},
					'/mobile': {
						eyebrow: 'SOLIVAGANT Mobile',
						title: 'Belanja parfum Solivagant.',
						headline: 'Mobile storefront sedang dimuat.',
						description: 'Pilih aroma ready stock, custom aroma, atau cek progress order dari pengalaman mobile Solivagant.',
						items: ['Beranda', 'Belanja', 'Artikel', 'Custom', 'Keranjang', 'Cek Order'],
					},
					'/mobile/home': {
						eyebrow: 'SOLIVAGANT Mobile',
						title: 'Belanja parfum Solivagant.',
						headline: 'Mobile storefront sedang dimuat.',
						description: 'Pilih aroma ready stock, custom aroma, atau cek progress order dari pengalaman mobile Solivagant.',
						items: ['Beranda', 'Belanja', 'Artikel', 'Custom', 'Keranjang', 'Cek Order'],
					},
					'/mobile/dashboard': {
						eyebrow: 'SOLIVAGANT Mobile',
						title: 'Belanja parfum Solivagant.',
						headline: 'Mobile storefront sedang dimuat.',
						description: 'Pilih aroma ready stock, custom aroma, atau cek progress order dari pengalaman mobile Solivagant.',
						items: ['Beranda', 'Belanja', 'Artikel', 'Custom', 'Keranjang', 'Cek Order'],
					},
					'/mobile/catalog': {
						eyebrow: 'Belanja',
						title: 'Cari parfum',
						headline: 'Katalog parfum mobile sedang dimuat.',
						description: 'Browse parfum, notes, mood, harga, dan stok dari katalog mobile Solivagant.',
						items: ['Search', 'Filter aroma', 'Sort', 'Product cards'],
					},
					'/mobile/articles': {
						eyebrow: 'Journal',
						title: 'Artikel parfum Solivagant.',
						headline: 'Journal mobile sedang dimuat.',
						description: 'Cerita aroma, material, proses studio, dan panduan kecil sebelum memilih parfum.',
						items: ['Formula accord', 'Experience', 'Material notes'],
					},
					'/mobile/bespoke': {
						eyebrow: 'Custom',
						title: 'Bespoke Perfume',
						headline: 'Customizer mobile sedang dimuat.',
						description: 'Pilih ukuran, botol, cap, label, dan ringkasan custom sebelum checkout.',
						items: ['Ukuran', 'Botol', 'Cap', 'Label', 'Checkout'],
					},
					'/mobile/cart': {
						eyebrow: 'Keranjang',
						title: 'Keranjang',
						headline: 'Keranjang mobile sedang dimuat.',
						description: 'Cek item, kuantitas, voucher, dan lanjutkan ke checkout.',
						items: ['Cart items', 'Quantity', 'Voucher', 'Checkout'],
					},
					'/mobile/checkout': {
						eyebrow: 'Checkout',
						title: 'Checkout',
						headline: 'Checkout mobile sedang dimuat.',
						description: 'Lengkapi kontak, alamat, ongkir, voucher, dan metode pembayaran.',
						items: ['Kontak', 'Alamat', 'Ongkir', 'Payment'],
					},
					'/mobile/payment': {
						eyebrow: 'Payment',
						title: 'Pembayaran',
						headline: 'Instruksi pembayaran sedang dimuat.',
						description: 'Lihat detail transfer manual BCA atau DOKU, lalu upload bukti transfer jika diperlukan.',
						items: ['Order', 'Total transfer', 'Rekening', 'Bukti transfer'],
					},
					'/mobile/customer': {
						eyebrow: 'Cek Order',
						title: 'Cek order',
						headline: 'Portal customer mobile sedang dimuat.',
						description: 'Masukkan customer code atau nomor order untuk melihat status dan histori pembelian.',
						items: ['Customer code', 'Order lookup', 'Timeline', 'Invoice'],
					},
				};

				function escapeHtml(value) {
					return String(value || '').replace(/[&<>"']/g, function (character) {
						return ({
							'&': '&amp;',
							'<': '&lt;',
							'>': '&gt;',
							'"': '&quot;',
							"'": '&#39;',
						})[character];
					});
				}

				function normalizePathname(pathname) {
					var normalized = String(pathname || '/').replace(/\/+$/, '');
					return normalized || '/';
				}

				function getRouteGroupFallbackContent(pathname) {
					if (pathname.indexOf('/mobile/products/') === 0) {
						return {
							eyebrow: 'Belanja',
							title: 'Detail parfum',
							headline: 'Detail produk mobile sedang dimuat.',
							description: 'Informasi notes, ukuran, harga, stok, dan tombol keranjang akan tampil sebentar lagi.',
							items: ['Visual produk', 'Notes', 'Varian', 'Keranjang'],
						};
					}

					if (pathname.indexOf('/mobile/articles/') === 0) {
						return {
							eyebrow: 'Journal',
							title: 'Artikel parfum',
							headline: 'Artikel mobile sedang dimuat.',
							description: 'Cerita aroma dan material Solivagant akan tampil sebentar lagi.',
							items: ['Cover', 'Kategori', 'Cerita', 'Artikel terkait'],
						};
					}

					if (pathname.indexOf('/mobile/customer/invoice/') === 0) {
						return {
							eyebrow: 'Invoice',
							title: 'Invoice order',
							headline: 'Invoice mobile sedang dimuat.',
							description: 'Ringkasan order, customer, total, dan status pembayaran akan tampil sebentar lagi.',
							items: ['Customer', 'Order', 'Total', 'Status'],
						};
					}

					if (pathname === '/mobile' || pathname.indexOf('/mobile/') === 0) {
						return PUBLIC_ROUTE_FALLBACKS['/mobile/dashboard'];
					}

					if (pathname.indexOf('/products/') === 0 || pathname.indexOf('/catalog/') === 0) {
						return PUBLIC_ROUTE_FALLBACKS['/catalog'];
					}

					if (pathname.indexOf('/articles/') === 0) {
						return PUBLIC_ROUTE_FALLBACKS['/journal'];
					}

					return null;
				}

				function getFallbackContent() {
					var pathname = normalizePathname(window.location.pathname);
					return PUBLIC_ROUTE_FALLBACKS[pathname] || getRouteGroupFallbackContent(pathname) || {
						eyebrow: 'SOLIVAGANT',
						title: 'Page not found.',
						headline: 'This public atelier page could not be found.',
						description: 'Return to the homepage or explore the SOLIVAGANT fragrance collection.',
						items: ['Homepage', 'Collection'],
					};
				}

				function getBootLinks() {
					var pathname = normalizePathname(window.location.pathname);
					var isMobileRoute = pathname === '/mobile' || pathname.indexOf('/mobile/') === 0;
					return isMobileRoute
						? [
							{ href: '/mobile/dashboard', label: 'Beranda' },
							{ href: '/mobile/catalog', label: 'Belanja' },
							{ href: '/mobile/bespoke', label: 'Custom' },
							{ href: '/mobile/customer', label: 'Cek Order' },
						]
						: [
							{ href: '/catalog', label: 'Explore Collection' },
							{ href: '/bespoke', label: 'Book Bespoke Consultation' },
						];
				}

				function renderPublicBootFallback() {
					var root = document.getElementById('root');
					if (!root) return;

					var content = getFallbackContent();

					root.innerHTML = [
						'<main class="app-boot-fallback" aria-label="Solivagant app initialization" role="status" aria-live="polite" aria-busy="true">',
						'  <div class="app-boot-shell">',
						'    <section class="app-boot-status">',
						'      <span class="app-boot-spinner" aria-hidden="true"></span>',
						'      <div>',
						'        <p>App initialization</p>',
						'        <h1>Loading workspace</h1>',
						'        <p class="app-boot-description">Menyiapkan halaman, data, dan shell aplikasi.</p>',
						'      </div>',
						'    </section>',
						'    <section class="app-boot-layout" aria-hidden="true">',
						'      <aside class="app-boot-sidebar">',
						'        <div class="app-boot-line medium"></div>',
						'        <div class="app-boot-line tall"></div>',
						'        <div class="app-boot-line tall"></div>',
						'        <div class="app-boot-line tall"></div>',
						'      </aside>',
						'      <div class="app-boot-panel">',
						'        <div class="app-boot-skeleton">',
						'          <div class="app-boot-line short"></div>',
						'          <div class="app-boot-line medium"></div>',
						'          <div class="app-boot-line"></div>',
						'        </div>',
						'        <div class="app-boot-grid">',
						'          <div class="app-boot-skeleton"><div class="app-boot-line short"></div><div class="app-boot-line medium"></div></div>',
						'          <div class="app-boot-skeleton"><div class="app-boot-line short"></div><div class="app-boot-line medium"></div></div>',
						'          <div class="app-boot-skeleton"><div class="app-boot-line short"></div><div class="app-boot-line medium"></div></div>',
						'        </div>',
						'        <div class="app-boot-skeleton">',
						'          <div class="app-boot-line"></div>',
						'          <div class="app-boot-line"></div>',
						'          <div class="app-boot-line medium"></div>',
						'        </div>',
						'      </div>',
						'    </section>',
						'  </div>',
						'</main>',
					].join('');
				}

				renderPublicBootFallback();

				var RECOVERY_KEY = 'solivagant.pwa.module-recovery.v2';
				var MAX_RECOVERY_ATTEMPTS = 2;
				var MODULE_FAILURE_MESSAGES = [
					'Importing a module script failed',
					'Failed to fetch dynamically imported module',
					'Loading chunk',
					'Unable to preload CSS',
				];

				function getRecoveryAttempts() {
					try {
						return Number(window.sessionStorage.getItem(RECOVERY_KEY) || '0');
					} catch (error) {
						return 0;
					}
				}

				function setRecoveryAttempts(value) {
					try {
						window.sessionStorage.setItem(RECOVERY_KEY, String(value));
					} catch (error) {
						// Session storage is optional; recovery should still continue.
					}
				}

				function isModuleFailure(eventOrReason) {
					var target = eventOrReason && eventOrReason.target;
					var message = String(
						(eventOrReason && eventOrReason.message)
						|| (eventOrReason && eventOrReason.reason && eventOrReason.reason.message)
						|| eventOrReason
						|| ''
					);

					if (target && target.tagName === 'SCRIPT' && target.type === 'module') {
						return true;
					}

					return MODULE_FAILURE_MESSAGES.some(function (entry) {
						return message.indexOf(entry) !== -1;
					});
				}

				function renderManualRecovery() {
					var root = document.getElementById('root');
					if (!root) return;

					root.innerHTML = [
						'<div class="app-boot-fallback" role="alert">',
						'  <div class="app-boot-shell">',
						'    <section class="app-boot-status">',
						'      <div>',
						'        <p>App recovery</p>',
						'        <h1>Cache perlu direset</h1>',
						'        <p class="app-boot-description">Refresh otomatis belum berhasil. Reset cache aplikasi untuk memuat versi terbaru.</p>',
						'      </div>',
						'    <button type="button" data-reset-app-cache style="margin-top:16px;min-height:44px;border:0;border-radius:14px;background:#263d27;color:white;padding:0 18px;font-weight:800;">Reset app cache</button>',
						'    </section>',
						'  </div>',
						'</div>',
					].join('');

					var button = root.querySelector('[data-reset-app-cache]');
					if (button) {
						button.addEventListener('click', function () {
							setRecoveryAttempts(0);
							recoverFromModuleFailure('manual reset');
						});
					}
				}

				async function clearAppRuntimeCache() {
					if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
						var registrations = await navigator.serviceWorker.getRegistrations();
						await Promise.all(registrations.map(function (registration) {
							return registration.unregister();
						}));
					}

					if (window.caches && window.caches.keys) {
						var cacheNames = await window.caches.keys();
						await Promise.all(cacheNames
							.filter(function (cacheName) {
								return cacheName.indexOf('solivagant-') === 0 || cacheName.indexOf('perfumer-studio-') === 0;
							})
							.map(function (cacheName) {
								return window.caches.delete(cacheName);
							}));
					}
				}

				async function recoverFromModuleFailure(reason) {
					if (!window.navigator.onLine) {
						return;
					}

					var attempts = getRecoveryAttempts();
					if (attempts >= MAX_RECOVERY_ATTEMPTS) {
						renderManualRecovery();
						return;
					}

					setRecoveryAttempts(attempts + 1);

					try {
						await clearAppRuntimeCache();
					} catch (error) {
						// Reload anyway. A new navigation may install the latest service worker.
					}

					var nextUrl = new URL(window.location.href);
					nextUrl.searchParams.set('pwa-recover', Date.now().toString(36));
					nextUrl.searchParams.set('reason', String(reason || 'module').slice(0, 24));
					window.location.replace(nextUrl.toString());
				}

				window.addEventListener('error', function (event) {
					if (isModuleFailure(event)) {
						event.preventDefault();
						recoverFromModuleFailure(event.message || 'module-script');
					}
				}, true);

				window.addEventListener('unhandledrejection', function (event) {
					if (isModuleFailure(event)) {
						event.preventDefault();
						recoverFromModuleFailure(event.reason || 'module-rejection');
					}
				});

				window.setTimeout(function () {
					var root = document.getElementById('root');
					if (root && root.querySelector('.app-boot-fallback')) {
						recoverFromModuleFailure('boot-timeout');
					}
				}, 14000);
			})();
		</script>
