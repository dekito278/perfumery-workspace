		<link rel="apple-touch-startup-image" href="/splash/apple-splash-1284-2778.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
		<link rel="apple-touch-startup-image" href="/splash/apple-splash-1170-2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
		<link rel="apple-touch-startup-image" href="/splash/apple-splash-1125-2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
		<link rel="apple-touch-startup-image" href="/splash/apple-splash-828-1792.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
		<link rel="apple-touch-startup-image" href="/splash/apple-splash-750-1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<meta name="theme-color" content="#263d27" />
		<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Solivagant" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="application-name" content="Solivagant" />
		<meta name="description" content="Solivagant storefront and studio workspace for products, orders, briefs, raw materials, formulas, and validation." />
		<title>Solivagant</title>
		<style>
			html {
				background: #f7f8f2;
			}

			body {
				margin: 0;
				background: #f7f8f2;
			}

			.app-boot-fallback {
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 24px;
				color: #263d27;
				font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				text-align: center;
			}

			.app-boot-spinner {
				width: 40px;
				height: 40px;
				margin: 0 auto 16px;
				border: 4px solid rgba(38, 61, 39, 0.2);
				border-top-color: #263d27;
				border-radius: 999px;
				animation: app-boot-spin 0.85s linear infinite;
			}

			.app-boot-fallback p {
				margin: 0;
				font-size: 14px;
				font-weight: 700;
			}

			@keyframes app-boot-spin {
				to {
					transform: rotate(360deg);
				}
			}
		</style>
	</head>
	<body>
		<div id="root">
			<div class="app-boot-fallback" role="status" aria-live="polite">
				<div>
					<div class="app-boot-spinner" aria-hidden="true"></div>
					<p>Loading Solivagant...</p>
				</div>
			</div>
		</div>
		<script>
			(function () {
				var RECOVERY_KEY = 'solivagant.pwa.module-recovery.v2';
				var MAX_RECOVERY_ATTEMPTS = 2;
				var MODULE_FAILURE_MESSAGES = [
					'Importing a module script failed',
					'Failed to fetch dynamically imported module',
					'Loading chunk',
					'Unable to preload CSS',
				];

				function getRecoveryAttempts() {
					try {
						return Number(window.sessionStorage.getItem(RECOVERY_KEY) || '0');
					} catch (error) {
						return 0;
					}
				}

				function setRecoveryAttempts(value) {
					try {
						window.sessionStorage.setItem(RECOVERY_KEY, String(value));
					} catch (error) {
						// Session storage is optional; recovery should still continue.
					}
				}

				function isModuleFailure(eventOrReason) {
					var target = eventOrReason && eventOrReason.target;
					var message = String(
						(eventOrReason && eventOrReason.message)
						|| (eventOrReason && eventOrReason.reason && eventOrReason.reason.message)
						|| eventOrReason
						|| ''
					);

					if (target && target.tagName === 'SCRIPT' && target.type === 'module') {
						return true;
					}

					return MODULE_FAILURE_MESSAGES.some(function (entry) {
						return message.indexOf(entry) !== -1;
					});
				}

				function renderManualRecovery() {
					var root = document.getElementById('root');
					if (!root) return;

					root.innerHTML = [
						'<div class="app-boot-fallback" role="alert">',
						'  <div>',
						'    <p>App cache perlu direset.</p>',
						'    <button type="button" data-reset-app-cache style="margin-top:16px;min-height:44px;border:0;border-radius:14px;background:#263d27;color:white;padding:0 18px;font-weight:800;">Reset app cache</button>',
						'  </div>',
						'</div>',
					].join('');

					var button = root.querySelector('[data-reset-app-cache]');
					if (button) {
						button.addEventListener('click', function () {
							setRecoveryAttempts(0);
							recoverFromModuleFailure('manual reset');
						});
					}
				}

				async function clearAppRuntimeCache() {
					if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
						var registrations = await navigator.serviceWorker.getRegistrations();
						await Promise.all(registrations.map(function (registration) {
							return registration.unregister();
						}));
					}

					if (window.caches && window.caches.keys) {
						var cacheNames = await window.caches.keys();
						await Promise.all(cacheNames
							.filter(function (cacheName) {
								return cacheName.indexOf('solivagant-') === 0 || cacheName.indexOf('perfumer-studio-') === 0;
							})
							.map(function (cacheName) {
								return window.caches.delete(cacheName);
							}));
					}
				}

				async function recoverFromModuleFailure(reason) {
					if (!window.navigator.onLine) {
						return;
					}

					var attempts = getRecoveryAttempts();
					if (attempts >= MAX_RECOVERY_ATTEMPTS) {
						renderManualRecovery();
						return;
					}

					setRecoveryAttempts(attempts + 1);

					try {
						await clearAppRuntimeCache();
					} catch (error) {
						// Reload anyway. A new navigation may install the latest service worker.
					}

					var nextUrl = new URL(window.location.href);
					nextUrl.searchParams.set('pwa-recover', Date.now().toString(36));
					nextUrl.searchParams.set('reason', String(reason || 'module').slice(0, 24));
					window.location.replace(nextUrl.toString());
				}

				window.addEventListener('error', function (event) {
					if (isModuleFailure(event)) {
						event.preventDefault();
						recoverFromModuleFailure(event.message || 'module-script');
					}
				}, true);

				window.addEventListener('unhandledrejection', function (event) {
					if (isModuleFailure(event)) {
						event.preventDefault();
						recoverFromModuleFailure(event.reason || 'module-rejection');
					}
				});

				window.setTimeout(function () {
					var root = document.getElementById('root');
					if (root && root.querySelector('.app-boot-fallback')) {
						recoverFromModuleFailure('boot-timeout');
					}
				}, 14000);
			})();
		</script>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
