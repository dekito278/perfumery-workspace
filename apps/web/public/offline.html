<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#b7791f" />
    <title>Perfumer Studio Offline</title>
    <style>
      :root {
        color: #1f2937;
        background: #f8f7f4;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 390px);
        border: 1px solid rgba(245, 158, 11, 0.24);
        border-radius: 22px;
        background: linear-gradient(180deg, #fffaf0 0%, #ffffff 100%);
        padding: 24px;
        box-shadow: 0 24px 50px -34px rgba(97, 64, 14, 0.55);
      }

      .mark {
        width: 54px;
        height: 54px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: #b7791f;
        color: white;
        font-weight: 800;
        letter-spacing: 0;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 1.35rem;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #6b7280;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin-top: 18px;
        border-radius: 14px;
        background: #1f2937;
        color: white;
        padding: 0 16px;
        font-size: 0.9rem;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">PS</div>
      <h1>Perfumer Studio is offline</h1>
      <p>The app shell is available, but live formulas and material data need a connection. Reconnect and try again.</p>
      <a href="/mobile/dashboard">Retry</a>
    </main>
  </body>
</html>
