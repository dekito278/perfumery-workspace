<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#263d27" />
    <meta name="description" content="Solivagant sedang offline. Sambungkan kembali koneksi untuk memuat data storefront dan studio terbaru." />
    <title>Solivagant Offline</title>
    <style>
      :root {
        color: #1f2937;
        background: #f8f7f4;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 390px);
        border: 1px solid rgba(38, 61, 39, 0.2);
        border-radius: 22px;
        background: linear-gradient(180deg, #eef2e8 0%, #ffffff 100%);
        padding: 24px;
        box-shadow: 0 24px 50px -34px rgba(24, 47, 27, 0.55);
      }

      .mark {
        width: 72px;
        height: 72px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: #050705;
        overflow: hidden;
      }

      .mark img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 1.35rem;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #6b7280;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin-top: 18px;
        border-radius: 14px;
        background: #263d27;
        color: white;
        padding: 0 16px;
        font-size: 0.9rem;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark"><img src="/icons/icon-192.png" alt="Solivagant" /></div>
      <h1>Solivagant sedang offline</h1>
      <p>Shell aplikasi masih tersedia, tetapi data storefront dan studio terbaru perlu koneksi. Sambungkan internet, lalu coba lagi.</p>
      <a href="/mobile/dashboard">Coba lagi</a>
    </main>
  </body>
</html>
